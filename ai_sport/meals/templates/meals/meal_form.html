<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加/编辑三餐记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <style>
        :root{--bg:#1a1a2e;--surface:#222240;--text:#c8c8d8;--text-dim:#707088;--accent:#7c8cf8}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .container{max-width:600px;margin:0 auto;padding:24px 16px}
        .header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
        .header a{color:var(--text-dim);text-decoration:none;font-size:.85rem}
        .header a:hover{color:var(--accent)}
        .header h1{font-size:1.3rem;font-weight:600}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;color:var(--text-dim);font-size:.85rem;margin-bottom:4px}
        .form-group input,.form-group select,.form-group textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:var(--text);padding:12px 14px;font-size:.9rem;font-family:inherit;transition:.2s}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 15px rgba(124,140,248,0.1)}
        .form-group textarea{resize:vertical;min-height:80px}
        .form-group select{appearance:none}
        .form-group select option{background:var(--surface);color:var(--text)}
        .form-group input[type=file]{padding:10px}
        .input-group{display:flex;gap:8px;align-items:center}
        .input-group textarea{flex:1}
        .btn{padding:12px 24px;border-radius:12px;font-size:.9rem;text-decoration:none;transition:.2s;border:none;cursor:pointer;font-family:inherit}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-primary:hover{background:#8b9cff}
        .btn-secondary{background:transparent;color:var(--text-dim);border:1px solid rgba(255,255,255,0.08)}
        .btn-secondary:hover{background:rgba(255,255,255,0.04);color:var(--text);text-decoration:none}
        .btn-info{background:rgba(124,140,248,0.15);color:var(--accent);padding:8px 14px;font-size:.83rem}
        .btn-info:hover{background:rgba(124,140,248,0.25)}
        .btn-info:disabled{opacity:.5;cursor:not-allowed}
        .btn-group{display:flex;gap:10px;margin-top:24px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{% url 'meal_list' %}">← 返回</a>
            <h1>{% if form.instance.pk %}编辑{% else %}添加{% endif %}三餐记录</h1>
        </div>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.meal_type.id_for_label }}">餐别</label>
                {{ form.meal_type }}
            </div>
            <div class="form-group">
                <label for="{{ form.date.id_for_label }}">日期</label>
                {{ form.date }}
            </div>
            <div class="form-group">
                <label for="{{ form.time.id_for_label }}">时间</label>
                {{ form.time }}
            </div>
            <div class="form-group">
                <label for="{{ form.image.id_for_label }}">食物照片</label>
                {{ form.image }}
            </div>
            <div class="form-group">
                <label for="{{ form.description.id_for_label }}">食物描述</label>
                <div class="input-group">
                    {{ form.description }}
                    <button type="button" id="ai-analyze-btn" class="btn btn-info">AI 分析</button>
                </div>
            </div>
            <div class="form-group">
                <label for="{{ form.calories.id_for_label }}">卡路里</label>
                {{ form.calories }}
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="{% url 'meal_list' %}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
    <script>
        $(document).ready(function() {
            $('#ai-analyze-btn').click(function() {
                if ($('#id_image').val() === '') {
                    alert('请先上传食物图片');
                    return;
                }
                $('#ai-analyze-btn').text('分析中...').prop('disabled', true);
                setTimeout(function() {
                    $('#id_description').val('米饭; 鸡蛋; 青菜');
                    $('#id_calories').val('223');
                    $('#ai-analyze-btn').text('AI 分析').prop('disabled', false);
                    alert('AI 分析完成，已自动填充食物信息和卡路里');
                }, 1000);
            });
        });
    </script>
</body>
</html>
