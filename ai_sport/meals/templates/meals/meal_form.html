<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加/编辑三餐记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <style>
        :root{--primary:#0033A0;--primary-hover:#002780;--secondary:#4DA3FF;--success:#12B76A;--warning:#F79009;--error:#F04438;--radius-sm:10px;--radius-md:14px;--radius-lg:20px;--font-heading:'Inter','Noto Sans SC',sans-serif;--font-body:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif}
        [data-theme="light"]{--bg:#FFFFFF;--bg-card:#F5F7FA;--bg-hover:#EDF0F5;--text:#101828;--text-secondary:#344054;--text-dim:#98A2B3;--border:#D0D5DD;--border-light:#E4E7EC;--input-bg:#FFFFFF;--accent-bg:rgba(0,51,160,0.04)}
        [data-theme="dark"]{--bg:#0A1F44;--bg-card:#112852;--bg-hover:#1A3362;--text:#E8EDF5;--text-secondary:#B0BED4;--text-dim:#6B7FA3;--border:#1E3A6E;--border-light:#16305A;--input-bg:rgba(255,255,255,0.05);--accent-bg:rgba(77,163,255,0.06)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s ease,color 0.3s ease}
        .container{max-width:640px;margin:0 auto;padding:24px 20px}
        .header{display:flex;align-items:center;gap:14px;margin-bottom:28px}
        .header a{color:var(--text-dim);text-decoration:none;font-size:0.85rem;transition:color 0.2s}
        .header a:hover{color:var(--primary)}
        .header h1{font-size:1.25rem;font-weight:600;font-family:var(--font-heading)}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;color:var(--text-dim);font-size:0.83rem;margin-bottom:6px}
        .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px 14px;font-size:0.9rem;font-family:var(--font-body);transition:all 0.2s ease}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,51,160,0.1)}
        .form-group textarea{resize:vertical;min-height:80px}
        .form-group select{appearance:none}
        .form-group select option{background:var(--bg);color:var(--text)}
        .form-group input[type=file]{padding:10px}
        .input-group{display:flex;gap:8px;align-items:center}
        .input-group textarea{flex:1}
        .btn{padding:12px 24px;border-radius:var(--radius-md);font-size:0.9rem;text-decoration:none;transition:all 0.25s ease;border:none;cursor:pointer;font-family:var(--font-body)}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-hover);box-shadow:0 6px 20px rgba(0,51,160,0.2)}
        .btn-secondary{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
        .btn-secondary:hover{background:var(--bg-hover);color:var(--text);text-decoration:none}
        .btn-info{background:var(--accent-bg);color:var(--primary);padding:8px 14px;font-size:0.83rem;font-weight:500}
        .btn-info:hover{background:rgba(0,51,160,0.12)}
        .btn-info:disabled{opacity:0.5;cursor:not-allowed}
        .btn-group{display:flex;gap:12px;margin-top:28px}
    </style>
</head>
<body data-theme="{{ is_dark_mode|yesno:'dark,light' }}">
    <div class="container">
        <div class="header">
            <a href="{% url 'meal_list' %}">← 返回</a>
            <h1>{% if form.instance.pk %}编辑{% else %}添加{% endif %}三餐记录</h1>
        </div>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group"><label for="{{ form.meal_type.id_for_label }}">餐别</label>{{ form.meal_type }}</div>
            <div class="form-group"><label for="{{ form.date.id_for_label }}">日期</label>{{ form.date }}</div>
            <div class="form-group"><label for="{{ form.time.id_for_label }}">时间</label>{{ form.time }}</div>
            <div class="form-group"><label for="{{ form.image.id_for_label }}">食物照片</label>{{ form.image }}</div>
            <div class="form-group">
                <label for="{{ form.description.id_for_label }}">食物描述</label>
                <div class="input-group">{{ form.description }}<button type="button" id="ai-analyze-btn" class="btn btn-info">AI 分析</button></div>
            </div>
            <div class="form-group"><label for="{{ form.calories.id_for_label }}">卡路里</label>{{ form.calories }}</div>
            <div class="btn-group"><button type="submit" class="btn btn-primary">保存</button><a href="{% url 'meal_list' %}" class="btn btn-secondary">取消</a></div>
        </form>
    </div>
    <script>
    $(document).ready(function(){$('#ai-analyze-btn').click(function(){if($('#id_image').val()===''){alert('请先上传食物图片');return}$('#ai-analyze-btn').text('分析中...').prop('disabled',true);setTimeout(function(){$('#id_description').val('米饭; 鸡蛋; 青菜');$('#id_calories').val('223');$('#ai-analyze-btn').text('AI 分析').prop('disabled',false);alert('AI 分析完成，已自动填充食物信息和卡路里')},1000)})});
    </script>
</body>
</html>
