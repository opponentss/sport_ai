<!--
    项目首页模板 - 磨砂玻璃风格

    本页面是整个应用的入口页面，展示四大功能模块入口。
    使用 Bootstrap 栅格系统和磨砂玻璃设计风格。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身打卡</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255,255,255,0.08) 0%, transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.8rem 1rem;
            position: relative;
            z-index: 1000;
            
            
            display: flex;      
            justify-content: space-between auto;          
            margin-right: center;
        }

        .navbar-brand {
            font-weight: 700;                /* 加粗字体，突出品牌 */
            font-size: 1.5rem;              /* 相对于根元素字号 1.5 倍，一般约 24px */
            color: #fff !important;         /* 强制白色文字，覆盖 Bootstrap 等框架默认色 */
            text-shadow: 0 2px 15px rgba(0,0,0,0.2); /* 向下 2px 的柔和黑色阴影，增加立体感和可读性 */
            letter-spacing: 2px;            /* 字间距拉开 2px，显得更精致、现代 */
            

             /* 居中方案：绝对定位（适合品牌始终居中，无视左右菜单） */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
        }

        .navbar-dark .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.9) !important;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 20px;
            padding: 0.5rem 1rem !important;
        }

        .navbar-dark .navbar-nav .nav-link:hover {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .navbar-text {
            color: rgba(255, 255, 255, 0.95) !important;
            font-weight: 500;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .hero-section {
            text-align: center;
            padding: 60px 0 40px;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            letter-spacing: 4px;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 300;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .module-card {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 2.5rem 2rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #fff, rgba(255,255,255,0.5));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .module-card:hover {
            transform: translateY(-10px) scale(1.03);
            background: rgba(255, 255, 255, 0.28);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .module-card:hover::before {
            opacity: 1;
        }

        .module-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }

        .module-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .module-desc {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .btn-light {
            background: rgba(255, 255, 255, 0.25) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            color: #fff !important;
            font-weight: 600;
            border-radius: 25px;
            padding: 0.5rem 1.5rem !important;
            transition: all 0.3s ease;
        }

        .btn-light:hover {
            background: rgba(255, 255, 255, 0.4) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            color: #fff;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }
            .module-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">健身打卡</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <span class="navbar-text mr-3">👤 {{ user.username }}</span>
                        </li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'logout' %}" class="d-inline">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-light btn-sm">退出</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="btn btn-light btn-sm" href="{% url 'login' %}">登录</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero-section">
            <h1 class="hero-title">🏃 健身打卡</h1>
            <p class="hero-subtitle">记录你的健身旅程，科学管理你的健康</p>
        </div>

        <div class="module-grid">
            <a href="{% url 'fitness_guide_home' %}" class="module-card" style="text-decoration: none;">
                <span class="module-icon">📚</span>
                <h3 class="module-title">健身指南</h3>
                <p class="module-desc">了解健身基础知识，饮食建议，肌肉和器材认识</p>
            </a>

            <a href="{% url 'checkin_list' %}" class="module-card" style="text-decoration: none;">
                <span class="module-icon">✅</span>
                <h3 class="module-title">打卡记录</h3>
                <p class="module-desc">记录你的健身活动，支持定位功能</p>
            </a>

            <a href="{% url 'meal_list' %}" class="module-card" style="text-decoration: none;">
                <span class="module-icon">🍽️</span>
                <h3 class="module-title">三餐记录</h3>
                <p class="module-desc">记录你的饮食情况，支持拍照和AI识别</p>
            </a>

            <a href="{% url 'sleep_list' %}" class="module-card" style="text-decoration: none;">
                <span class="module-icon">😴</span>
                <h3 class="module-title">作息记录</h3>
                <p class="module-desc">记录你的睡眠情况，分析睡眠质量</p>
            </a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
