<!--
    用户登录页面模板 - 磨砂玻璃风格

    使用渐变紫色背景和磨砂玻璃卡片设计。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 健身打卡</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 30% 70%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }

        .card-header h2 {
            color: #fff;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.3rem;
            text-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        .card-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .card-body {
            padding: 2.5rem 2.5rem 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 15px;
            color: #fff;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            outline: none;
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 20px;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            width: 100%;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
            color: #fff;
        }

        .register-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .register-link p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.8rem;
        }

        .btn-register {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 0.8rem 2rem;
            color: #fff;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-register:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            color: #fff;
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-home a:hover {
            color: #fff;
        }

        .error-messages {
            background: rgba(255, 100, 100, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 100, 100, 0.4);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-card">
            <div class="card-header">
                <h2>🔐 用户登录</h2>
                <p>欢迎回到健身打卡</p>
            </div>

            <div class="card-body">
                {% if form.errors %}
                    <div class="error-messages">
                        <p>⚠️ 用户名或密码错误，请重试。</p>
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="id_username">用户名</label>
                        <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="id_password">密码</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>

                    <button type="submit" class="btn btn-login">登 录</button>
                </form>

                <div class="register-link">
                    <p>还没有账户？</p>
                    <a href="{% url 'register' %}" class="btn btn-register">立即注册</a>
                </div>

                <div class="back-home">
                    <a href="{% url 'home' %}">← 返回首页</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
