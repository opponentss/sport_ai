<!--
    用户登录页面模板

    本页面提供用户登录功能。
    使用渐变紫色背景和卡片式布局。

    页面功能：
    - 用户名和密码输入
    - 登录表单验证
    - 错误提示显示
    - 链接到注册页面
    - 链接返回首页

    样式特点：
    - 渐变背景色（紫色调）
    - 居中显示的登录卡片
    - 圆角和阴影效果
    - 悬浮动画效果
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 健身打卡软件</title>
    <!-- 引入 Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- 登录页面专属样式 -->
    <style>
        /* 渐变紫色背景 */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 登录容器，居中定位 */
        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
        }

        /* 登录卡片样式 */
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* 登录头部样式 */
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        /* 输入框样式 */
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        /* 输入框聚焦样式 */
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 登录按钮样式 */
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            transition: transform 0.2s;
        }

        /* 登录按钮悬浮效果 */
        .btn-login:hover {
            transform: translateY(-2px);
        }

        /* 错误提示样式 */
        .error-messages {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            color: #721c24;
        }
    </style>
</head>
<body>
    <!-- 登录容器 -->
    <div class="login-container">
        <!-- 登录卡片 -->
        <div class="login-card">
            <!-- 登录头部 -->
            <div class="login-header">
                <h2>用户登录</h2>
                <p class="mb-0">健身打卡软件</p>
            </div>

            <!-- 登录表单区域 -->
            <div class="login-body">
                <!-- 错误提示信息 -->
                {% if form.errors %}
                    <div class="error-messages">
                        <p>用户名或密码错误，请重试。</p>
                    </div>
                {% endif %}

                <!-- 登录表单 -->
                <form method="post">
                    {% csrf_token %}

                    <!-- 用户名输入框 -->
                    <div class="form-group">
                        <label for="id_username">用户名</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>

                    <!-- 密码输入框 -->
                    <div class="form-group">
                        <label for="id_password">密码</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>

                    <!-- 登录按钮 -->
                    <button type="submit" class="btn btn-primary btn-login">登 录</button>
                </form>

                <!-- 注册链接区域 -->
                <div class="text-center mt-4">
                    <p class="mb-2">还没有账户？</p>
                    <!-- 注册按钮 -->
                    <a href="{% url 'register' %}" class="btn btn-outline-primary" style="width: 100%;">
                        立即注册
                    </a>
                </div>

                <!-- 返回首页链接 -->
                <div class="text-center mt-3">
                    <a href="{% url 'home' %}" class="text-muted">返回首页</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
