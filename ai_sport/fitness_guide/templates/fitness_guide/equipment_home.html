<!--
    器材分类首页模板

    本页面展示器材的三大分类入口：
    1. 有氧器材 - 跑步机、椭圆机、动感单车等
    2. 力量训练器材 - 杠铃、哑铃、史密斯机等
    3. 功能性训练器材 - TRX、壶铃、战绳等

    继承自 base.html，使用统一的导航栏和样式。
    每个分类卡片包含描述信息和"进入学习"按钮。
-->
{% extends 'fitness_guide/base.html' %}

<!-- 页面标题，使用后端传递的 title 变量 -->
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <!-- 返回按钮 -->
        <div class="back-btn">
            <a href="{% url 'fitness_guide_home' %}" class="btn btn-outline-primary">← 返回健身指南</a>
        </div>

        <!-- 页面主标题区域 -->
        <div class="jumbotron bg-light p-4 mb-4">
            <h1 class="display-4">{{ title }}</h1>
            <p class="lead">熟悉健身房常见器材的使用方法，选择你要学习的器材类别：</p>
        </div>
    </div>
</div>

<!-- 器材分类卡片区域 -->
<div class="row">
    <!-- 遍历后端传递的 categories 列表 -->
    {% for cat in categories %}
    <div class="col-md-4">
        <!-- 分类卡片，带有悬浮动画效果 -->
        <div class="card module-card">
            <div class="card-body">
                <!-- 分类名称 -->
                <h5 class="card-title">{{ cat.name }}</h5>
                <!-- 分类描述 -->
                <p class="card-text">{{ cat.description }}</p>
                <!-- 进入学习按钮，链接到该类别器材列表页 -->
                <a href="{% url 'equipment_list' cat.key %}" class="btn btn-primary">进入学习</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
