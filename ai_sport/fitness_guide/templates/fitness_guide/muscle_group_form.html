{% extends 'fitness_guide/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="back-btn">
            <a href="{% url 'muscle_home' %}" class="btn btn-outline-primary">← 返回</a>
        </div>

        <div class="glass-card">
            <div class="card-header" style="background: rgba(255,255,255,0.15); border-bottom: 1px solid rgba(255,255,255,0.2);">
                <h4 class="mb-0" style="color: #fff;">{{ title }}</h4>
            </div>

            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="id_name" style="color: rgba(255,255,255,0.95);">肌肉群名称 <span style="color: #ff6b6b;">*</span></label>
                        {{ form.name }}
                    </div>

                    <div class="form-group">
                        <label for="id_latin_name" style="color: rgba(255,255,255,0.95);">拉丁学名</label>
                        {{ form.latin_name }}
                    </div>

                    <div class="form-group">
                        <label for="id_category" style="color: rgba(255,255,255,0.95);">所属大类 <span style="color: #ff6b6b;">*</span></label>
                        {{ form.category }}
                    </div>

                    <div class="form-group">
                        <label for="id_icon" style="color: rgba(255,255,255,0.95);">图标</label>
                        {{ form.icon }}
                        <small class="form-text" style="color: rgba(255,255,255,0.6);">输入emoji图标，如：💪、🦵、❤️等</small>
                    </div>

                    <div class="form-group">
                        <label for="id_description" style="color: rgba(255,255,255,0.95);">简要描述</label>
                        {{ form.description }}
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="{% url 'muscle_home' %}" class="btn btn-outline-secondary" style="margin-left: 0.5rem;">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
