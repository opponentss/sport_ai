<!--
    器材删除确认页模板

    本页面用于确认删除器材操作，防止误删。
    显示器材名称，确认后执行删除。

    后端传递的上下文变量：
    - title: 页面标题
    - equipment: 要删除的 Equipment 模型实例
    - category: 器材类别标识符
-->
{% extends 'fitness_guide/base.html' %}

<!-- 页面标题 -->
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <!-- 返回按钮 -->
        <div class="back-btn">
            <a href="{% url 'equipment_detail' category equipment.id %}" class="btn btn-outline-primary">← 返回器材详情</a>
        </div>

        <!-- 删除确认卡片，红色边框突出危险操作 -->
        <div class="card border-danger">
            <!-- 卡片头部，红色背景 -->
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">确认删除</h4>
            </div>

            <div class="card-body">
                <!-- 确认提示信息 -->
                <p>确定要删除器材 <strong>{{ equipment.name }}</strong> 吗？</p>
                <!-- 警告信息 -->
                <p class="text-muted">此操作无法撤销。</p>

                <!-- 删除表单 -->
                <form method="post">
                    {% csrf_token %}
                    <!-- 确认删除按钮 -->
                    <button type="submit" class="btn btn-danger">确认删除</button>
                    <!-- 取消按钮 -->
                    <a href="{% url 'equipment_detail' category equipment.id %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
