{% extends 'fitness_guide/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="back-btn">
            <a href="{% url 'diet_detail' category diet_item.id %}" class="btn btn-outline-primary">← 返回详情</a>
        </div>

        <div class="glass-card" style="max-width: 500px; margin: 0 auto; text-align: center; padding: 2rem;">
            <span style="font-size: 4rem; display: block; margin-bottom: 1.5rem;">⚠️</span>
            <h2 style="color: #fff; margin-bottom: 1rem;">确认删除</h2>

            <div class="glass-card mb-4" style="background: rgba(255,255,255,0.1); padding: 1.5rem;">
                <h5 style="color: #fff;">{{ diet_item.title }}</h5>
                <p style="color: rgba(255,255,255,0.7); margin-bottom: 0;">
                    类别：{{ diet_item.get_category_display }}
                    {% if diet_item.is_featured %}
                    <span class="badge" style="background: rgba(255,193,7,0.9); color: #fff; margin-left: 0.5rem;">精选推荐</span>
                    {% endif %}
                </p>
            </div>

            <p style="color: rgba(255,255,255,0.9); margin-bottom: 2rem;">确定要删除以上饮食建议吗？<br>此操作无法撤销。</p>

            <form method="post">
                {% csrf_token %}
                <div class="btn-group" style="display: flex; gap: 1rem; justify-content: center;">
                    <button type="submit" class="btn btn-primary" style="background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); border: none;">确认删除</button>
                    <a href="{% url 'diet_detail' category diet_item.id %}" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
