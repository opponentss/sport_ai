<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 轻松运动</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #222240;
            --surface-hover: #2a2a50;
            --text: #c8c8d8;
            --text-dim: #707088;
            --accent: #7c8cf8;
            --accent-dim: #5a6ad0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 600px; margin: 0 auto;
            padding: 20px 16px 60px;
        }

        .header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 28px;
        }

        .header .back-link {
            color: var(--text-dim); text-decoration: none;
            font-size: 0.85rem;
        }

        .header .back-link:hover { color: var(--accent); }

        .header h1 { font-size: 1.3rem; font-weight: 600; }

        .form-section {
            display: flex; flex-direction: column; gap: 16px;
        }

        .form-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 16px; background: var(--surface);
            border-radius: 16px;
        }

        .form-item .item-label { flex: 1; }
        .form-item .item-title { font-size: 0.95rem; font-weight: 500; }
        .form-item .item-desc { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }

        .toggle-switch {
            position: relative; width: 50px; height: 28px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0; width: 0; height: 0;
        }

        .toggle-slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.08);
            border-radius: 14px;
            transition: 0.3s ease;
        }

        .toggle-slider::before {
            content: ''; position: absolute;
            height: 22px; width: 22px;
            left: 3px; bottom: 3px;
            background: #555;
            border-radius: 50%;
            transition: 0.3s ease;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(22px);
            background: #fff;
        }

        .radio-group {
            display: flex; gap: 8px; flex-shrink: 0;
        }

        .radio-option {
            padding: 6px 14px; border-radius: 10px;
            font-size: 0.83rem; cursor: pointer;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text-dim);
            transition: all 0.2s ease;
        }

        .radio-option.selected {
            background: rgba(124,140,248,0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-save {
            display: block; width: 100%;
            padding: 16px; background: var(--accent);
            color: #fff; border: none;
            border-radius: 16px; font-size: 1rem;
            font-weight: 500; cursor: pointer;
            transition: all 0.25s ease; margin-top: 20px;
            font-family: inherit;
        }

        .btn-save:hover {
            background: #8b9cff;
            box-shadow: 0 6px 24px rgba(124,140,248,0.3);
        }

        .messages {
            background: rgba(68,170,153,0.1);
            border: 1px solid rgba(68,170,153,0.2);
            border-radius: 12px; padding: 12px 16px;
            margin-bottom: 16px; font-size: 0.85rem;
            color: #4a9; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{% url 'home' %}" class="back-link">← 返回</a>
            <h1>设置</h1>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="messages">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" class="form-section">
            {% csrf_token %}

            <div class="form-item">
                <div class="item-label">
                    <div class="item-title">匿名模式</div>
                    <div class="item-desc">不显示用户名，使用匿名身份</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" name="anonymous_mode" {% if profile.anonymous_mode %}checked{% endif %}>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="form-item">
                <div class="item-label">
                    <div class="item-title">深色模式</div>
                    <div class="item-desc">使用暗色界面，减少视觉刺激</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" name="dark_mode" {% if profile.dark_mode %}checked{% endif %}>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="form-item">
                <div class="item-label">
                    <div class="item-title">社交能量低模式</div>
                    <div class="item-desc">减少语音和提示，更安静的训练体验</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" name="low_social_mode" {% if profile.low_social_mode %}checked{% endif %}>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="form-item">
                <div class="item-label">
                    <div class="item-title">请勿打扰</div>
                    <div class="item-desc">无强提醒，不推送，不做内疚提示</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" name="do_not_disturb" {% if profile.do_not_disturb %}checked{% endif %}>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="form-item" style="flex-direction:column;align-items:flex-start;gap:12px;">
                <div class="item-label">
                    <div class="item-title">AI陪练风格</div>
                    <div class="item-desc">选择训练引导的语气风格</div>
                </div>
                <div class="radio-group" id="coachTypeGroup">
                    <label class="radio-option {% if profile.preferred_coach_type == 'calm' %}selected{% endif %}" data-value="calm">
                        冷静型
                    </label>
                    <label class="radio-option {% if profile.preferred_coach_type == 'rational' %}selected{% endif %}" data-value="rational">
                        理性型
                    </label>
                    <label class="radio-option {% if profile.preferred_coach_type == 'light_tsukkomi' %}selected{% endif %}" data-value="light_tsukkomi">
                        轻吐槽型
                    </label>
                </div>
                <input type="hidden" name="preferred_coach_type" id="coachTypeInput" value="{{ profile.preferred_coach_type }}">
            </div>

            <button type="submit" class="btn-save">保存设置</button>
        </form>
    </div>

    <script>
        document.querySelectorAll('.radio-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('coachTypeInput').value = this.dataset.value;
            });
        });
    </script>
</body>
</html>
