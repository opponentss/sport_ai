<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#0033A0;--primary-hover:#002780;--secondary:#4DA3FF;--success:#12B76A;--warning:#F79009;--error:#F04438;--radius-sm:10px;--radius-md:14px;--radius-lg:20px;--font-heading:'Inter','Noto Sans SC',sans-serif;--font-body:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif}
        [data-theme="light"]{--bg:#FFFFFF;--bg-card:#F5F7FA;--bg-hover:#EDF0F5;--text:#101828;--text-secondary:#344054;--text-dim:#98A2B3;--border:#D0D5DD;--border-light:#E4E7EC;--input-bg:#FFFFFF}
        [data-theme="dark"]{--bg:#0A1F44;--bg-card:#112852;--bg-hover:#1A3362;--text:#E8EDF5;--text-secondary:#B0BED4;--text-dim:#6B7FA3;--border:#1E3A6E;--border-light:#16305A;--input-bg:rgba(255,255,255,0.05)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s ease,color 0.3s ease}
        .container{max-width:720px;margin:0 auto;padding:24px 20px 60px}
        .header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
        .header a{color:var(--text-dim);text-decoration:none;font-size:0.85rem;transition:color 0.2s}
        .header a:hover{color:var(--primary)}
        .header h1{font-size:1.25rem;font-weight:600;font-family:var(--font-heading)}
        .btn{display:inline-block;padding:10px 20px;border-radius:var(--radius-md);font-size:0.85rem;text-decoration:none;transition:all 0.25s ease;border:none;cursor:pointer;font-family:var(--font-body)}
        .btn-accent{background:var(--primary);color:#fff}
        .btn-accent:hover{background:var(--primary-hover);color:#fff;text-decoration:none}
        .btn-outline{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
        .btn-outline:hover{background:var(--bg-hover);color:var(--text);text-decoration:none}
        .btn-danger{background:rgba(240,68,56,0.06);color:var(--error)}
        .btn-danger:hover{background:rgba(240,68,56,0.14);text-decoration:none;color:var(--error)}
        .btn-sm{padding:6px 14px;font-size:0.78rem}
        table{width:100%;border-collapse:collapse;font-size:0.88rem}
        th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border-light)}
        th{color:var(--text-dim);font-weight:500;font-size:0.8rem}
        tr:hover td{background:var(--bg-card)}
        .actions{display:flex;gap:8px}
        .empty{text-align:center;padding:48px 0;color:var(--text-dim)}
    </style>
</head>
<body data-theme="{{ is_dark_mode|yesno:'dark,light' }}">
    <div class="container">
        <div class="header">
            <a href="{% url 'home' %}">← 返回</a>
            <h1>打卡记录</h1>
        </div>
        <div style="margin-bottom:20px;display:flex;gap:10px">
            <a href="{% url 'checkin_create' %}" class="btn btn-accent">添加打卡</a>
            <a href="{% url 'home' %}" class="btn btn-outline">返回首页</a>
        </div>
        {% if checkins %}
        <table>
            <thead><tr><th>活动</th><th>时长</th><th>日期</th><th>位置</th><th>操作</th></tr></thead>
            <tbody>
                {% for c in checkins %}
                <tr>
                    <td>{{ c.activity }}</td><td>{{ c.duration }}分钟</td>
                    <td>{{ c.date }}</td><td>{{ c.location|default:"-" }}</td>
                    <td class="actions">
                        <a href="{% url 'checkin_update' c.pk %}" class="btn btn-outline btn-sm">编辑</a>
                        <a href="{% url 'checkin_delete' c.pk %}" class="btn btn-danger btn-sm">删除</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}<div class="empty">还没有打卡记录</div>{% endif %}
    </div>
</body>
</html>
